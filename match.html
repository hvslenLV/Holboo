<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Холбоо — Хосоо ол</title>
  
  <script>
    // МАШ ЧУХАЛ: Хэрэглэгч бүртгүүлээгүй бол match.html рүү шууд орохыг зөвшөөрөхгүй, register.html рүү буцаана
    if (!localStorage.getItem('currentUser')) {
      window.location.href = 'register.html';
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1A0E1C;
      --bg2:      #221428;
      --gold:     #E8A87C;
      --gold-lt:  #F2D4C2;
      --rose:     #C1607A;
      --text:     #F5EDE8;
      --muted:    #9C8A86;
      --card:     #2B1830;
      --border:   #3D2240;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 80px;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 48px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      text-decoration: none;
    }
    .logo span { color: var(--rose); }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--rose);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 8px;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      color: #ff4a5a;
      border-color: #ff4a5a;
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── MATCH INTERACTION ── */
    .match-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 12px 36px rgba(0,0,0,0.2);
      position: relative;
    }

    .profile-img {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 24px rgba(193,96,122,0.3);
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .profile-meta {
      color: var(--gold);
      font-size: 0.95rem;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .profile-bio {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .interest-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(193,96,122,0.15);
      border: 1px solid rgba(193,96,122,0.3);
      color: var(--rose);
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn-action {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .btn-action.dislike:hover {
      background: #3a1e25;
      border-color: #632230;
    }
    .btn-action.like {
      background: var(--rose);
      border: none;
      color: white;
      box-shadow: 0 6px 16px rgba(193,96,122,0.3);
    }
    .btn-action.like:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(193,96,122,0.5);
    }

    /* ── MESSAGE DRAWER ── */
    .message-container {
      margin-top: 40px;
      display: none;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: left;
    }
    .message-header {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .message-input-area {
      display: flex;
      gap: 12px;
    }
    .message-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
    }
    .btn-send {
      background: var(--rose);
      color: #fff;
      border: none;
      padding: 0 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--rose);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 200;
    }

    @media(max-width: 640px) {
      nav { padding: 16px 20px; }
      .match-box { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <div class="toast" id="toast">Та хоёр таарлаа! 💖</div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">Хол<span>бо</span>о</a>
    <div class="nav-user">
      <div class="user-avatar" id="navAvatar">У</div>
      <span id="navName">Хэрэглэгч</span>
      <button class="btn-logout" onclick="logoutUser()">Гарах</button>
    </div>
  </nav>

  <div class="container">
    <h2 class="section-title">Таны дараагийн таарц</h2>

    <div class="match-box" id="profileBox">
      <div class="profile-img" id="pAvatar">А</div>
      <div class="profile-name" id="pName">Алтанцэцэг</div>
      <div class="profile-meta" id="pMeta">42 нас • Сүхбаатар дүүрэг</div>
      <div class="profile-bio" id="pBio">Би аялах, шинэ зүйлс сурах дуртай. Эерэг халуун дулаан яриа өрнүүлэх сайн хань хайж байна.</div>
      <span class="interest-badge" id="pInterest">Аялах сонирхолтой</span>

      <div class="actions">
        <button class="btn-action dislike" onclick="nextProfile()">❌</button>
        <button class="btn-action like" onclick="likeProfile()">💗</button>
      </div>

      <!-- Чатлах хэсэг -->
      <div class="message-container" id="msgContainer">
        <div class="message-header">💬 Зурвас илгээх</div>
        <div class="message-input-area">
          <input type="text" class="message-input" id="msgText" placeholder="Сайн уу, танилцаж болох уу?..." />
          <button class="btn-send" onclick="sendMessage()">Илгээх</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Mock Profiles
    const mockProfiles = [
      { name: "Баярсайхан", age: 48, location: "Хан-Уул", bio: "Спорт болон байгальд дуртай. Амралтын өдрүүдээр салхинд гарах дуртай хүнтэй танилцана.", interest: "Байгаль дуртай", gender: "male", avatar: "Б" },
      { name: "Солонго", age: 41, location: "Баянзүрх", bio: "Урлаг сонирхдог, гэртээ тухтай орчин бүрдүүлэх дуртай. Ухаалаг, төлөв даруу хань хайж байна.", interest: "Урлаг сонирхдог", gender: "female", avatar: "С" },
      { name: "Пүрэвсүрэн", age: 50, location: "Чингэлтэй", bio: "Унших, хувийн хөгжилдөө анхаардаг. Харилцан яриа маш чухал гэж боддог.", interest: "Ном уншдаг", gender: "male", avatar: "П" },
      { name: "Гэрэлмаа", age: 45, location: "Баянгол", bio: "Хоол хийх дуртай, гэр бүлсэг. Хөгжилтэй, нээлттэй найдвартай залуутай танилцана.", interest: "Хоол хийх", gender: "female", avatar: "Г" }
    ];

    let currentIdx = 0;

    window.onload = function() {
      const stored = localStorage.getItem('currentUser');
      if (stored) {
        const user = JSON.parse(stored);
        document.getElementById('navName').textContent = user.name;
        document.getElementById('navAvatar').textContent = user.name.charAt(0).toUpperCase();
      }
      showProfile();
    }

    function showProfile() {
      if(currentIdx >= mockProfiles.length) {
        currentIdx = 0;
      }
      const p = mockProfiles[currentIdx];
      document.getElementById('pAvatar').textContent = p.avatar;
      document.getElementById('pName').textContent = p.name;
      document.getElementById('pMeta').textContent = `${p.age} нас • ${p.location} дүүрэг`;
      document.getElementById('pBio').textContent = p.bio;
      document.getElementById('pInterest').textContent = p.interest;
      document.getElementById('msgContainer').style.display = 'none';
    }

    function nextProfile() {
      currentIdx++;
      showProfile();
    }

    function likeProfile() {
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
        document.getElementById('msgContainer').style.display = 'block';
      }, 1000);
    }

    function sendMessage() {
      const txt = document.getElementById('msgText').value;
      if (txt.trim() === '') return;
      
      const toast = document.getElementById('toast');
      toast.textContent = 'Зурвас илгээгдлээ! 💌';
      toast.style.display = 'block';
      document.getElementById('msgText').value = '';
      
      setTimeout(() => {
        toast.style.display = 'none';
        toast.textContent = 'Та хоёр таарлаа! 💖';
        nextProfile();
      }, 1500);
    }

    // Системээс гарах функц
    function logoutUser() {
      localStorage.removeItem('currentUser'); // Санах ойг устгах
      window.location.href = 'index.html'; // Нүүр хуудас руу шилжих
    }
  </script>

</body>
</html>
