<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Холбоо - Монголын 40+ насныханд зориулсан хос олох платформд нэвтрэх" />
  <meta name="theme-color" content="#1A0E1C" />
  <title>Нэвтрэх — Холбоо</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1A0E1C;
      --bg2:      #221428;
      --gold:     #E8A87C;
      --gold-lt:  #F2D4C2;
      --rose:     #C1607A;
      --rose-dark:#a8405a;
      --text:     #F5EDE8;
      --muted:    #9C8A86;
      --card:     #2B1830;
      --border:   #3D2240;
      --success:  #22c55e;
      --error:    #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BACKGROUND ── */
    .page-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(193,96,122,0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,168,124,0.08) 0%, transparent 50%);
    }

    .floating-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .floating-shapes span {
      position: absolute;
      border-radius: 50%;
      opacity: 0.03;
      animation: floatShape 20s ease-in-out infinite;
    }
    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: linear-gradient(to bottom, rgba(26,14,28,.95), transparent);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: .04em;
      text-decoration: none;
      transition: opacity .2s;
    }
    .logo:hover { opacity: .8; }
    .logo span { color: var(--rose); }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--gold); }
    .back-link svg { width: 18px; height: 18px; }

    /* ── MAIN LAYOUT ── */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--rose));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── HEADER ── */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-header .icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--gold), #c9956a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
      box-shadow: 0 8px 32px rgba(232,168,124,0.3);
    }
    .login-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.6;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      transition: color .2s;
    }
    .form-group:focus-within .form-label {
      color: var(--gold);
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
      width: 20px;
      height: 20px;
    }
    .form-group:focus-within .input-icon {
      color: var(--rose);
    }
    .form-input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      transition: all .2s;
      outline: none;
    }
    .form-input::placeholder {
      color: var(--muted);
      opacity: .5;
    }
    .form-input:hover {
      border-color: rgba(193,96,122,0.4);
    }
    .form-input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(193,96,122,0.1);
    }
    .form-input.has-icon-right {
      padding-right: 48px;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s;
    }
    .password-toggle:hover { color: var(--gold); }
    .password-toggle svg { width: 20px; height: 20px; }

    /* ── REMEMBER & FORGOT ── */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: .82rem;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
    }
    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      appearance: none;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .remember input[type="checkbox"]:checked {
      background: var(--rose);
      border-color: var(--rose);
    }
    .remember input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: .6rem;
      font-weight: bold;
    }
    .forgot-link {
      color: var(--gold);
      text-decoration: none;
      transition: opacity .2s;
    }
    .forgot-link:hover { opacity: .8; text-decoration: underline; }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 8px 28px rgba(193,96,122,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(193,96,122,0.5);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }
    .submit-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: .8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--muted);
      font-size: .8rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── REGISTER LINK ── */
    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: .9rem;
      color: var(--muted);
    }
    .register-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      transition: opacity .2s;
    }
    .register-link a:hover { opacity: .8; text-decoration: underline; }

    /* ── ALERT ── */
    .alert {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: .88rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #86efac;
    }
    .alert svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .container { padding: 90px 16px 40px; }
      .login-card { padding: 32px 24px; border-radius: 20px; }
      .login-header h1 { font-size: 1.5rem; }
    }

    ::selection { background: rgba(193,96,122,.3); color: var(--text); }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="page-bg"></div>
  <div class="floating-shapes" id="shapes"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">Хол<span>бо</span>о</a>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Буцах
    </a>
  </nav>

  <!-- MAIN -->
  <div class="container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="icon">🔐</div>
        <h1>Нэвтрэх</h1>
        <p>Хосоо олох аялалаа үргэлжлүүлээрэй</p>
      </div>

      <!-- Alerts -->
      <div class="alert alert-error" id="errorAlert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
      </div>
      <div class="alert alert-success" id="successAlert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>Амжилттай нэвтэрлээ!</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Имэйл</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" class="form-input" id="email" placeholder="tanii@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Нууц үг</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" class="form-input has-icon-right" id="password" placeholder="Нууц үгээ оруулна уу" required />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Нууц үг харах">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" id="remember" />
            <span>Сануулах</span>
          </label>
          <a href="#" class="forgot-link">Нууц үг мартсан?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Нэвтрэх</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="divider">эсвэл</div>

      <div class="register-link">
        Бүртгэл байхгүй юу? <a href="register.html">Шинээр бүртгүүлэх</a>
      </div>
    </div>
  </div>

<script>
  // ===== FLOATING SHAPES =====
  const shapesContainer = document.getElementById('shapes');
  for (let i = 0; i < 6; i++) {
    const span = document.createElement('span');
    const size = 100 + Math.random() * 200;
    span.style.width = size + 'px';
    span.style.height = size + 'px';
    span.style.background = i % 2 === 0 ? 'var(--rose)' : 'var(--gold)';
    span.style.left = Math.random() * 100 + '%';
    span.style.top = Math.random() * 100 + '%';
    span.style.animationDelay = (Math.random() * 10) + 's';
    span.style.animationDuration = (15 + Math.random() * 10) + 's';
    shapesContainer.appendChild(span);
  }

  // ===== PASSWORD TOGGLE =====
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  const eyeOffIcon = document.getElementById('eyeOffIcon');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    eyeIcon.style.display = type === 'password' ? 'block' : 'none';
    eyeOffIcon.style.display = type === 'password' ? 'none' : 'block';
  });

  // ===== FORM SUBMIT =====
  function showError(msg) {
    const alert = document.getElementById('errorAlert');
    document.getElementById('errorText').textContent = msg;
    alert.classList.add('show');
    setTimeout(() => alert.classList.remove('show'), 5000);
  }

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) {
      showError('Имэйл болон нууц үгээ оруулна уу');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    // Check localStorage users
    const users = JSON.parse(localStorage.getItem('kholboo_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    setTimeout(() => {
      if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        document.getElementById('successAlert').classList.add('show');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } else {
        showError('Имэйл эсвэл нууц үг буруу байна');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }, 1000);
  });
</script>

</body>
</html>
