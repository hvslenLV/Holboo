<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Холбоо — Бүртгүүлэх</title>
  
  <script>
    // МАШ ЧУХАЛ: Хэрэглэгч аль хэдийн бүртгүүлсэн бол дахин бүртгүүлэх шаардлагагүй, шууд match.html рүү шилжүүлнэ
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'match.html';
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1A0E1C;
      --bg2:      #221428;
      --gold:     #E8A87C;
      --gold-lt:  #F2D4C2;
      --rose:     #C1607A;
      --text:     #F5EDE8;
      --muted:    #9C8A86;
      --card:     #2B1830;
      --border:   #3D2240;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .register-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 8px;
    }
    .logo span { color: var(--rose); }

    .title {
      text-align: center;
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--gold-lt);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--rose);
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .form-group {
      flex: 1;
    }

    select.form-control {
      appearance: none;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--rose), #a8405a);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(193,96,122,0.25);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(193,96,122,0.4);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--gold);
    }

    /* Амжилттай болсон үед харуулах мэдэгдэл */
    .toast {
      position: fixed;
      top: 24px;
      background: #2b5c3f;
      border: 1px solid #3d8c5a;
      color: #e6f7ed;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: none;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>

  <div class="toast" id="toast">Бүртгэл амжилттай үүсэв! Түр хүлээнэ үү...</div>

  <div class="register-container">
    <div class="logo">Хол<span>бо</span>о</div>
    <div class="title">Хосоо олох анхны алхам</div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Таны нэр</label>
        <input type="text" id="name" class="form-control" placeholder="Жишээ нь: Анужин" required />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="age">Нас</label>
          <input type="number" id="age" class="form-control" min="18" max="100" placeholder="40" required />
        </div>
        <div class="form-group">
          <label for="gender">Хүйс</label>
          <select id="gender" class="form-control" required>
            <option value="" disabled selected>Сонгох</option>
            <option value="female">Эмэгтэй</option>
            <option value="male">Эрэгтэй</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="location">Байршил / Дүүрэг</label>
        <select id="location" class="form-control" required>
          <option value="" disabled selected>Сонгох</option>
          <option value="Хан-Уул">Хан-Уул</option>
          <option value="Баянзүрх">Баянзүрх</option>
          <option value="Сүхбаатар">Сүхбаатар</option>
          <option value="Чингэлтэй">Чингэлтэй</option>
          <option value="Баянгол">Баянгол</option>
          <option value="Сонгинохайрхан">Сонгинохайрхан</option>
          <option value="Орон нутаг">Орон нутаг</option>
        </select>
      </div>

      <div class="form-group">
        <label for="interest">Таны сонирхол (Tag)</label>
        <input type="text" id="interest" class="form-control" placeholder="Жишээ нь: Ном унших, Аялал" required />
      </div>

      <button type="submit" class="btn-submit">Бүртгүүлэх</button>
    </form>

    <a href="index.html" class="back-link">← Нүүр хуудас руу буцах</a>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const age = document.getElementById('age').value;
      const gender = document.getElementById('gender').value;
      const location = document.getElementById('location').value;
      const interest = document.getElementById('interest').value;

      // Шинэ хэрэглэгчийн мэдээллийг хөтчийн санах ойд түр хадгалах
      const newUser = { name, age, gender, location, interest };
      localStorage.setItem('currentUser', JSON.stringify(newUser));

      // Амжилттай болсон мэдэгдэл харуулах
      const toast = document.getElementById('toast');
      toast.style.display = 'block';

      setTimeout(() => {
        window.location.href = 'match.html'; // Хос олох хуудас руу шилжих
      }, 1000);
    });
  </script>

</body>
</html>
